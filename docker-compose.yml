version: '3.8'

services:
  # Spatial Database Layer for Geofenced Node Footprints
  database:
    image: postgis/postgis:15-3.3
    container_name: coinos_spatial_db
    environment:
      POSTGRES_USER: coinos_admin
      POSTGRES_PASSWORD: secure_password_2026
      POSTGRES_DB: coinos_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - coinos_network

  # Asynchronous Message Broker Layer for the Cascade Engine
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: coinos_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - coinos_network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: coinos_event_bus
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - coinos_network

  # Next-Gen Proactive Intelligence Microservice
  ml-engine:
    build:
      context: ./services/ml-engine
    container_name: coinos_ml_engine
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: "kafka:29092"
      MODEL_ENVIRONMENT: "STAGING"
    networks:
      - coinos_network

volumes:
  pgdata:

networks:
  coinos_network:
    driver: bridge
